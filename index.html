<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseSim - NIAS Paramedic Engine</title>
    <script src="https://cdn.tailwindcss.com\"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nias: {
                            green: '#005a36',
                            yellow: '#ffcc00',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-900 text-slate-100 h-screen flex flex-col font-sans overflow-hidden">

    <header class="bg-nias-green text-white p-4 flex justify-between items-center shadow-md border-b-4 border-nias-yellow">
        <div class="flex items-center gap-3">
            <h1 class="text-2xl font-bold tracking-wider">PULSE<span class="text-nias-yellow">SIM</span></h1>
            <span class="bg-slate-800 text-xs px-2 py-1 rounded">Scenario: Sepsis (Adult)</span>
        </div>
        <div class="flex items-center gap-6">
            <div id="timer-display" class="text-xl font-mono bg-slate-800 px-4 py-2 rounded border border-slate-600 text-nias-yellow font-bold">10:00</div>
            <button id="btn-end" class="bg-red-600 hover:bg-red-700 text-white text-xs font-bold px-3 py-2 rounded transition">End Scenario</button>
        </div>
    </header>

    <main class="flex-1 flex p-4 gap-4 overflow-hidden">
        
        <div class="flex-1 bg-slate-800 rounded-lg border border-slate-700 flex flex-col overflow-hidden shadow-inner">
            <div id="chat-feed" class="flex-1 p-4 overflow-y-auto flex flex-col gap-3">
                </div>
            
            <div class="p-3 bg-slate-800 border-t border-slate-700 flex gap-2">
                <input id="chat-input" type="text" placeholder="Type clinical query or history-taking question..." class="flex-1 bg-slate-900 text-slate-100 p-3 rounded-lg border border-slate-700 focus:outline-none focus:border-nias-green transition">
                <button id="btn-send" class="bg-nias-green hover:bg-emerald-800 text-white font-bold px-6 rounded-lg shadow transition">Send</button>
            </div>
        </div>

        <div class="w-80 flex flex-col gap-4">
            
            <div class="bg-slate-950 rounded-lg p-4 border-2 border-slate-800 shadow-xl flex flex-col gap-3 font-mono">
                <h3 class="text-xs text-slate-500 uppercase tracking-widest font-sans font-bold">Zoll Monitor Display</h3>
                
                <div class="grid grid-cols-2 gap-2">
                    <div class="bg-slate-900 p-2 rounded border border-slate-800">
                        <div class="text-[10px] text-green-400 font-sans">HR (bpm)</div>
                        <div id="vital-hr" class="text-3xl font-bold text-green-400">---</div>
                    </div>
                    <div class="bg-slate-900 p-2 rounded border border-slate-800">
                        <div class="text-[10px] text-red-400 font-sans">NIBP (mmHg)</div>
                        <div id="vital-bp" class="text-2xl font-bold text-red-400 mt-1">---</div>
                    </div>
                    <div class="bg-slate-900 p-2 rounded border border-slate-800">
                        <div class="text-[10px] text-cyan-400 font-sans">SpO2 (%)</div>
                        <div id="vital-spo2" class="text-3xl font-bold text-cyan-400">---</div>
                    </div>
                    <div class="bg-slate-900 p-2 rounded border border-slate-800">
                        <div class="text-[10px] text-yellow-500 font-sans">RR (rpm)</div>
                        <div id="vital-rr" class="text-3xl font-bold text-yellow-500">---</div>
                    </div>
                    <div class="bg-slate-900 p-2 rounded border border-slate-800">
                        <div class="text-[10px] text-purple-400 font-sans">TEMP (°C)</div>
                        <div id="vital-temp" class="text-3xl font-bold text-purple-400">---</div>
                    </div>
                    <div class="bg-slate-900 p-2 rounded border border-slate-800">
                        <div class="text-[10px] text-orange-400 font-sans">BM (mmol/L)</div>
                        <div id="vital-bm" class="text-3xl font-bold text-orange-400">---</div>
                    </div>
                </div>
            </div>

            <div class="bg-slate-800 rounded-lg flex-1 border border-slate-700 p-4 flex flex-col">
                <h2 class="text-slate-100 font-bold text-sm mb-3 uppercase tracking-widest border-b border-slate-700 pb-1">Interventions</h2>
                <div class="flex-1 overflow-y-auto pr-2 flex flex-col gap-2">
                    <button class="intervention-btn bg-slate-700 hover:bg-slate-600 text-left px-3 py-2 rounded text-sm transition" data-action="oxygen">Administer Oxygen (15L NRBM)</button>
                    <button class="intervention-btn bg-slate-700 hover:bg-slate-600 text-left px-3 py-2 rounded text-sm transition" data-action="iv-access">Gain IV Access</button>
                    <button class="intervention-btn bg-slate-700 hover:bg-slate-600 text-left px-3 py-2 rounded text-sm transition" data-action="fluids">Administer 500ml NaCl</button>
                    <button class="intervention-btn bg-slate-700 hover:bg-slate-600 text-left px-3 py-2 rounded text-sm transition" data-action="bm-check">Check Blood Glucose</button>
                </div>
            </div>
        </div>
    </main>

    <script src="engine.js"></script>
</body>
</html>
